name: Golf Tracker

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"
      timezone: "Europe/London"
    - cron: "0 11 * * *"
      timezone: "Europe/London"
    - cron: "0 19 * * *"
      timezone: "Europe/London"

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Mint fresh eBay token
        shell: bash
        run: |
          RESPONSE=$(curl -s -X POST "https://api.ebay.com/identity/v1/oauth2/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -H "Authorization: Basic $(printf "%s:%s" "${{ secrets.EBAY_APP_ID }}" "${{ secrets.EBAY_CERT_ID }}" | base64)" \
            -d "grant_type=client_credentials&scope=https://api.ebay.com/oauth/api_scope")
          TOKEN=$(python -c 'import json,sys; print(json.load(sys.stdin)["access_token"])' <<< "$RESPONSE")
          echo "EBAY_ACCESS_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Run tracker
        env:
          EBAY_ACCESS_TOKEN: ${{ env.EBAY_ACCESS_TOKEN }}
          SHEET_NAME: ${{ secrets.SHEET_NAME }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python golf_tracker.py
