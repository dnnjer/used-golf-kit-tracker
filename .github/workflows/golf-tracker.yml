name: Golf Tracker

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 11 * * *"
    - cron: "0 19 * * *"

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Mint fresh eBay token
        shell: bash
        env:
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          EBAY_CERT_ID: ${{ secrets.EBAY_CERT_ID }}
        run: |
          AUTH=$(python -c "import base64, os; print(base64.b64encode(f'{os.environ['EBAY_APP_ID']}:{os.environ['EBAY_CERT_ID']}'.encode()).decode())")
          RESPONSE=$(curl -sS -X POST "https://api.ebay.com/identity/v1/oauth2/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -H "Authorization: Basic $AUTH" \
            -d "grant_type=client_credentials&scope=https://api.ebay.com/oauth/api_scope")

          echo "$RESPONSE"

          TOKEN=$(python -c 'import json,sys; data=json.load(sys.stdin); print(data.get("access_token",""))' <<< "$RESPONSE")

          if [ -z "$TOKEN" ]; then
            echo "Failed to get eBay token"
            exit 1
          fi

          echo "EBAY_ACCESS_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Run tracker
        env:
          EBAY_ACCESS_TOKEN: ${{ env.EBAY_ACCESS_TOKEN }}
          SHEET_NAME: ${{ secrets.SHEET_NAME }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python golf_tracker.py
